[tool.ruff]
line-length = 80
target-version = "py311"

[tool.ruff.lint]
select = [
    # pycodestyle errors
    "E",
    # pycodestyle warnings
    "W",
    # Pyflakes
    "F",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # pyupgrade
    "UP",
    # flake8-comprehensions
    "C4",
    # flake8-return
    "RET",
    # flake8-builtins
    "A",
    # Ruff-specific rules
    "RUF",
    # mccabe (Complexity)
    "C90",
]
ignore = ["RUF100"]